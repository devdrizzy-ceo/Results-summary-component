<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Lexend+Deca:wght@100..900&family=Outfit:wght@100..900&family=Young+Serif&display=swap"
      rel="stylesheet"
    />

    <title>Frontend Mentor | Results summary component</title>

    <style>
      .attribution {
        font-size: 0.6875rem;
        text-align: center;
      }
      .attribution a {
        color: hsl(228, 45%, 44%);
      }
    </style>
  </head>
  <body>
    <main>
      <div class="left">
        <div class="first-sentence">Your Result</div>

        <div class="score"><span class="main-score"> 76 </span>of 100</div>

        <div class="great">Great</div>

        <div class="last-paragraph">
          You scored higher than 65% of the people who have taken these tests.
        </div>
      </div>
      <div class="right">
        <p>Summary</p>

        <div class="score-cards">
          <div class="card-one">
            <div class="red">
              <img src="./assets/images/icon-reaction.svg" alt="icon" />

              Reaction
            </div>
            <div class="numbers">
              80
              <div class="last-number">/ 100</div>
            </div>
          </div>
          <div class="card-two">
            <div class="yellow">
              <img src="./assets/images/icon-memory.svg" alt="icon" /> Memory
            </div>

            <div class="numbers">
              92
              <div class="last-number">/ 100</div>
            </div>
          </div>

          <div class="card-three">
            <div class="green">
              <img src="./assets/images/icon-verbal.svg" alt="icon" />Verbal
            </div>
           <div class="numbers"> 61 <div class="last-number">/ 100</div></div>
          </div>

          <div class="card-four">
            <div class="purple"
              ><img src="./assets/images/icon-visual.svg" /> Visual
            </div>
           <div class="numbers" >72 <div class="last-number">/ 100</div></div>
          </div>

          <div class="last-card">Continue</div>
        </div>
      </div>
    </main>
    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="#">Daniel David</a>.
    </footer>
  </body>
</html>
